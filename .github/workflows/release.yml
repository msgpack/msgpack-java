name: Release to Sonatype

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  publish:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 10000
      # Fetch all tags so that sbt-dynver can find the previous release version
      - run: git fetch --tags -f
      # sbt 2 requires JDK 17+ to run. Android compatibility (originally JDK8,
      # see https://github.com/msgpack/msgpack-java/issues/516) is enforced
      # independently via the -source/-target 1.8 javacOptions in build.sbt.
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: adopt
      - name: Setup GPG
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
        run: echo $PGP_SECRET | base64 --decode | gpg --import --batch --yes
      - name: Build bundle
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: |
          ./sbt publishSigned
      - name: Release to Sonatype
        env:
          SONATYPE_USERNAME: '${{ secrets.SONATYPE_USERNAME }}'
          SONATYPE_PASSWORD: '${{ secrets.SONATYPE_PASSWORD }}'
        run: ./sbt sonaRelease
